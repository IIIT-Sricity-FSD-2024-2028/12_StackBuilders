<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create New Consultation Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="Create_New_Consultation.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Create New Consultation Session</h1>
    </section>

    <section class="form-card">
      <form class="session-form">
        <div class="field">
          <label for="session-title">Session Title</label>
          <input
            id="session-title"
            type="text"
            placeholder="Enter session title"
          />
        </div>

        <div class="row two-col">
          <div class="field">
            <label for="date">Date</label>
            <input
              id="date"
              type="text"
              placeholder="dd-mm-yyyy"
            />
          </div>

          <div class="field">
            <label for="time">Time</label>
            <input id="time" type="text" />
          </div>
        </div>

        <div class="field">
          <label for="duration">Session Duration</label>
          <input id="duration" type="text" />
        </div>

        <div class="field">
          <label for="meeting-link">Meeting Link</label>
          <input
            id="meeting-link"
            type="url"
            placeholder="https://meet.example.com/session"
          />
        </div>

        <div class="actions">
          <button type="button" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Session</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
